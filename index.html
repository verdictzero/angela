<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ROADKILL</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <!-- Loading Screen (visible immediately, fades out once first frame renders) -->
    <div id="loading-screen">
        <div id="loading-text">LOADING</div>
        <div id="loading-status"></div>
    </div>

    <!-- Updating UI Overlay (shown during resize/rotation) -->
    <div id="updating-ui-overlay">
        <div id="updating-text">UPDATING UI</div>
    </div>

    <!-- HUD Bar — fixed 7-segment display console -->
    <div id="hud-bar">
        <div class="hud-slot"><span id="hud-speed">VEL: 000 mph</span></div>
        <div class="hud-slot"><span id="hud-tach">TACH: 0000/G0</span></div>
        <div class="hud-slot"><span id="hud-hp">HP: 100/100</span></div>
        <div class="hud-slot"><span id="hud-fluid">W_FLD: 100</span></div>
        <div class="hud-slot"><span id="hud-fuel">FUEL: 100</span></div>
        <div class="hud-slot"><span id="hud-time">TIME 00:00</span></div>
        <div class="hud-slot hud-slot-sep"></div>
        <div class="hud-slot"><span id="hud-mult" class="hud-amber">MULTx00</span></div>
        <div class="hud-slot"><span id="hud-hit" class="hud-amber">+00000</span></div>
        <div class="hud-slot"><span id="hud-score">SCORE: 000000</span></div>
    </div>

    <!-- Touch Controls -->
    <div id="touch-controls" class="hidden">
        <div id="touch-steer">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>
        <div id="touch-pedals">
            <button id="btn-gas">GAS</button>
            <button id="btn-brake">BRAKE</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>ROADKILL</h1>
        <p>Drive. Crush. Splatter.</p>
        <div id="start-prompt">CLICK / TAP TO START</div>
        <div id="controls-info">
            <div>WASD / Arrows — Steer &amp; Drive</div>
            <div>Space — Handbrake &nbsp; Shift — Boost</div>
            <div>F — Wipers &nbsp; R — Washer Fluid</div>
            <div>Gamepad supported</div>
        </div>
    </div>

    <!-- Blood overlay -->
    <div id="blood-overlay"></div>

    <!-- Canvas container -->
    <div id="game-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
