<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ROADKILL</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
</head>
<body>
    <!-- HUD Overlay -->
    <div id="hud">
        <div id="hud-speed">0 <span>km/h</span></div>
        <div id="hud-score">SCORE: 0</div>
        <div id="hud-combo" class="hidden"></div>
        <div id="hud-time">08:00 DAY</div>
    </div>

    <!-- Debug Stats Overlay -->
    <div id="debug-stats">
        <div id="debug-stats-panel" class="collapsed">
            <div id="debug-fps">FPS: --</div>
            <div id="debug-draws">DRAWS: --</div>
            <div id="debug-tris">TRIS: --</div>
            <div id="debug-geoms">GEOMS: --</div>
            <div id="debug-textures">TEX: --</div>
        </div>
        <button id="debug-stats-toggle">STATS</button>
    </div>

    <!-- Touch Controls -->
    <div id="touch-controls" class="hidden">
        <div id="touch-steer">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>
        <div id="touch-pedals">
            <button id="btn-gas">GAS</button>
            <button id="btn-brake">BRAKE</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>ROADKILL</h1>
        <p>Drive. Crush. Splatter.</p>
        <div id="start-prompt">CLICK / TAP TO START</div>
        <div id="controls-info">
            <div>WASD / Arrows — Steer &amp; Drive</div>
            <div>Space — Handbrake</div>
            <div>Gamepad supported</div>
        </div>
    </div>

    <!-- Blood overlay -->
    <div id="blood-overlay"></div>

    <!-- Canvas container -->
    <div id="game-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
