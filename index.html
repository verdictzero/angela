<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ROADKILL</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <!-- Loading Screen (visible immediately, fades out once first frame renders) -->
    <div id="loading-screen">
        <div id="loading-text">LOADING</div>
        <div id="loading-status"></div>
    </div>

    <!-- Updating UI Overlay (shown during resize/rotation) -->
    <div id="updating-ui-overlay">
        <div id="updating-text">UPDATING UI</div>
    </div>

    <!-- HUD Bar -->
    <div id="hud-bar">
        <span id="hud-score">SCORE: 000000</span>
        <span class="hud-sep">|</span>
        <span id="hud-speed">VEL: 000 mph</span>
        <span class="hud-sep">|</span>
        <span id="hud-time">TIME 00:00:00</span>
    </div>

    <!-- HUD extras (combo, health, debug) -->
    <div id="hud">
        <div id="hud-combo" class="hidden"></div>
        <div id="hud-health-bar"><div id="hud-health-fill"></div></div>
        <div id="hud-debug-wrapper">
            <div id="hud-fluid">FLUID: 100</div>
            <button id="btn-slowmo">SLOW MO</button>
            <button id="hud-debug-toggle">DEBUG</button>
            <div id="hud-debug"></div>
        </div>
    </div>

    <!-- Debug Stats Overlay -->
    <div id="debug-stats">
        <div id="debug-stats-panel" class="collapsed">
            <div id="debug-fps">FPS: --</div>
            <div id="debug-draws">DRAWS: --</div>
            <div id="debug-tris">TRIS: --</div>
            <div id="debug-geoms">GEOMS: --</div>
            <div id="debug-textures">TEX: --</div>
        </div>
        <button id="debug-stats-toggle">STATS</button>
    </div>

    <!-- Touch Controls -->
    <div id="touch-controls" class="hidden">
        <div id="touch-steer">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>
        <div id="touch-pedals">
            <button id="btn-gas">GAS</button>
            <button id="btn-brake">BRAKE</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>ROADKILL</h1>
        <p>Drive. Crush. Splatter.</p>
        <div id="start-prompt">CLICK / TAP TO START</div>
        <div id="controls-info">
            <div>WASD / Arrows — Steer &amp; Drive</div>
            <div>Space — Handbrake &nbsp; Shift — Boost</div>
            <div>F — Wipers &nbsp; R — Washer Fluid</div>
            <div>Gamepad supported</div>
        </div>
    </div>

    <!-- Blood overlay -->
    <div id="blood-overlay"></div>

    <!-- Canvas container -->
    <div id="game-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
